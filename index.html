<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel OBS Pro</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/obs-websocket-js@5/dist/obs-ws.min.js"></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Produccion</p>
        <h1>Panel OBS Pro</h1>
      </div>
      <div class="led-wrap">
        <span id="obsLed" class="led led-off"></span>
        <span id="obsStatus">Desconectado</span>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="operacion">Operacion</button>
      <button class="tab" data-tab="setup">Setup</button>
    </nav>

    <section id="operacion" class="tab-panel active">
      <details class="section" open>
        <summary>Urgente</summary>
        <div class="section-body">
          <button id="panicBtn" class="btn btn-danger big">URGENTE</button>
          <p class="hint">Activa fondo de alerta y fuerza el titulo en rojo.</p>
        </div>
      </details>

      <details class="section" open>
        <summary>Zocalo</summary>
        <div class="section-body">
          <label class="field">
            <span>Titulo</span>
            <textarea id="titleInput" rows="4" placeholder="Escribi el titulo al aire"></textarea>
          </label>
          <button id="sendTitleBtn" class="btn btn-live">MANDAR AL VIVO</button>
          <div class="live-row">
            <span id="titleLiveLed" class="led led-off"></span>
            <span id="titleLiveText">Standby</span>
          </div>
        </div>
      </details>

      <details class="section">
        <summary>Clima</summary>
        <div class="section-body">
          <label class="field">
            <span>Ciudad</span>
            <input id="cityInput" type="text" placeholder="Ej: Resistencia" />
          </label>
          <div class="row">
            <button id="searchWeatherBtn" class="btn btn-neutral">Buscar</button>
            <button id="sendWeatherBtn" class="btn btn-live">Enviar</button>
          </div>
          <div class="preview">
            <div><strong>Temp:</strong> <span id="weatherTemp">--</span></div>
            <div><strong>Condicion:</strong> <span id="weatherDesc">Sin datos</span></div>
            <div class="weather-icon-row">
              <strong>Icono:</strong>
              <img id="weatherIconImg" alt="icono clima" />
              <span id="weatherIconText">--</span>
            </div>
          </div>
        </div>
      </details>

      <details class="section">
        <summary>Hora</summary>
        <div class="section-body">
          <div class="clock-box">
            <div id="clockText" class="clock-text">00:00:00</div>
            <div id="clockDate" class="clock-date">--</div>
          </div>
          <label class="switch-row">
            <span>Sync Auto</span>
            <input id="autoClockToggle" type="checkbox" />
          </label>
          <button id="sendClockBtn" class="btn btn-neutral">Enviar ahora</button>
        </div>
      </details>
    </section>

    <section id="setup" class="tab-panel">
      <details class="section" open>
        <summary>Conexion OBS</summary>
        <div class="section-body">
          <label class="field">
            <span>IP</span>
            <input id="obsHost" type="text" placeholder="127.0.0.1" />
          </label>
          <label class="field">
            <span>Puerto</span>
            <input id="obsPort" type="number" placeholder="4455" />
          </label>
          <label class="field">
            <span>Password</span>
            <input id="obsPassword" type="password" placeholder="Password websocket" />
          </label>
          <div class="row">
            <button id="connectBtn" class="btn btn-live">Conectar</button>
            <button id="disconnectBtn" class="btn btn-neutral">Desconectar</button>
          </div>
        </div>
      </details>

      <details class="section" open>
        <summary>Branding</summary>
        <div class="section-body">
          <label class="field">
            <span>Tema visual</span>
            <select id="themeSelect">
              <option value="deportivo">Deportivo</option>
              <option value="noticiero">Noticiero</option>
              <option value="minimal">Minimal</option>
            </select>
          </label>
          <label class="switch-row">
            <span>Logo</span>
            <input id="logoToggle" type="checkbox" />
          </label>
        </div>
      </details>

      <details class="section">
        <summary>OpenWeather</summary>
        <div class="section-body">
          <label class="field">
            <span>API Key</span>
            <input id="weatherApiKey" type="password" placeholder="Tu API key" />
          </label>
        </div>
      </details>

      <details class="section">
        <summary>Bitacora</summary>
        <div class="section-body">
          <div id="logOutput" class="log"></div>
        </div>
      </details>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
